<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Deep Tycoon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-cave-mesh {
            background-color: #0b0d11;
            background-image: radial-gradient(#1e293b 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-black text-white font-sans overflow-hidden bg-cave-mesh">
    <div id="root">
        <header class="px-6 py-4 border-b border-white/5 flex flex-col gap-4 bg-white/[0.02] backdrop-blur-2xl">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-2">
                        <span class="text-xl font-mono font-bold text-green-400">$4,662.20</span>
                    </div>
                    <div class="flex flex-col">
                        <div class="flex items-center justify-between text-[8px] font-black uppercase tracking-widest text-blue-300/50 mb-1">
                            <span>Level 2</span><span>52%</span>
                        </div>
                        <div class="w-32 h-1.5 bg-white/5 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-500" style="width: 52%;"></div>
                        </div>
                    </div>
                </div>
                <div class="text-right">
                    <span class="text-[10px] font-black text-white uppercase tracking-widest">Crystal Deep Tycoon</span>
                </div>
            </div>
        </header>

        <main class="flex flex-col items-center justify-center h-[70vh] gap-8">
            <div class="text-center">
                <h1 class="text-4xl font-black text-blue-400 mb-2">CRYSTAL DEEP</h1>
                <p class="text-gray-500 uppercase tracking-[0.2em] text-xs">Mining Expedition Started</p>
            </div>
            
            <button class="w-48 h-48 rounded-full border-4 border-blue-500/30 bg-blue-600/10 flex items-center justify-center group active:scale-95 transition-all">
                <div class="w-40 h-40 rounded-full bg-blue-600 shadow-[0_0_50px_rgba(37,99,235,0.4)] flex items-center justify-center">
                    <span class="text-white font-black">MINE</span>
                </div>
            </button>
        </main>
    </div>
</body>
</html>
